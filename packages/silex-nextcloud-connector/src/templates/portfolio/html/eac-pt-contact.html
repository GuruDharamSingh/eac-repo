<!--
  eac-pt-contact.html  —  Artist Portfolio: contact + social footer
  Traits: email, socialLinks, studioAddress, displayName
-->
<footer class="eac-pt-contact" id="contact" data-gjs-type="eac-pt-contact">
  <div class="eac-pt-contact__inner">

    <div class="eac-pt-contact__col eac-pt-contact__col--main">
      <span class="eac-pt-contact__label">Contact</span>
      <a class="eac-pt-contact__email" href="mailto:studio@example.com" data-href-trait="email">
        studio@example.com
      </a>
      <p class="eac-pt-contact__studio" data-gjs-editable="true" data-trait="studioAddress">
        Toronto, ON · Canada
      </p>
      <p class="eac-pt-contact__response">
        I respond to all inquiries within 3–5 business days.
      </p>
    </div>

    <div class="eac-pt-contact__col">
      <span class="eac-pt-contact__label">Links</span>
      <nav class="eac-pt-contact__social" data-trait="socialLinks">
        <a class="eac-pt-contact__social-link" href="#" target="_blank" rel="noopener">Instagram</a>
        <a class="eac-pt-contact__social-link" href="#" target="_blank" rel="noopener">Artsy</a>
        <a class="eac-pt-contact__social-link" href="#" target="_blank" rel="noopener">Linktree</a>
      </nav>
    </div>

    <div class="eac-pt-contact__col">
      <span class="eac-pt-contact__label">Collective</span>
      <a class="eac-pt-contact__collective-link" href="/community">
        Elkdonis Arts Collective
      </a>
      <p class="eac-pt-contact__collective-note">
        Part of a community of independent artists across the region.
      </p>
    </div>

    <div class="eac-pt-contact__copy">
      <span data-gjs-editable="true" data-trait="displayName">Artist Name</span>
      &copy; <span data-trait="currentYear">2024</span> &mdash;
      All rights reserved
    </div>

  </div>
</footer>

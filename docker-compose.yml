  # Inner Gathering App
  inner-gathering:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: eac-inner-gathering
    depends_on:
      postgres:
        condition: service_healthy
      supabase-auth:
        condition: service_started
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-elkdonis_dev}

      # Supabase Auth (Docker internal)
      SUPABASE_URL: http://supabase-auth:9999
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-http://localhost:9999}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # Supabase Realtime (WebSocket for browser)
      NEXT_PUBLIC_SUPABASE_REALTIME_URL: ${REALTIME_URL:-ws://localhost:4000/socket}

      # Redis
      REDIS_URL: redis://redis:6379

      # Nextcloud
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-http://nextcloud-nginx:80}
      NEXTCLOUD_PUBLIC_URL: ${NEXTCLOUD_PUBLIC_URL:-http://localhost:8080}
      NEXT_PUBLIC_NEXTCLOUD_URL: ${NEXT_PUBLIC_NEXTCLOUD_URL:-http://localhost:8080}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}

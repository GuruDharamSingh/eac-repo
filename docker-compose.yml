  # Silex - browser-based static site builder (opt-in custom layout per artist)
  # Editor is root-mounted at http://localhost:6805. The Arts app owns
  # /edit/{slug} as an authenticated launch gate; nginx should expose Silex on
  # a dedicated editor origin so Silex can own /api, /connector, /user, etc.
  silex:
    image: silexlabs/silex:latest
    container_name: eac-silex
    environment:
      SILEX_URL: ${SILEX_PUBLIC_URL:-http://localhost:6805}
      SILEX_PORT: 6805
      SILEX_DATA_PATH: /silex/data
      SILEX_HOSTING_PATH: /silex/data/public
      SILEX_DEFAULT_WEBSITE_ID: default
      SILEX_SERVER_CONFIG: /silex/extensions/silex-nextcloud-connector/index.js
      SILEX_CLIENT_CONFIG: /silex/extensions/silex-nextcloud-connector/src/client-config.js
    volumes:
      - silex_data:/silex/data
      - ./packages/silex-nextcloud-connector:/silex/extensions/silex-nextcloud-connector:ro
    ports:
      - "6805:6805"
    restart: unless-stopped
    networks:
      - eac-network
      - nextcloud-network

volumes:
  postgres_data:
  redis_data:
  silex_data:

networks:
  eac-network:
    driver: bridge
  nextcloud-network:
    external: true

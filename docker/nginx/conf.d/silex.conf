# Silex editor origin.
#
# Silex is root-mounted and uses root-relative paths such as /api, /connector,
# /user, /login, and /logout. Keep it on its own host instead of nesting it
# under the Arts app path namespace.
server {
    listen 80;
    listen [::]:80;
    server_name edit.localhost silex.localhost;

    client_max_body_size 100M;

    location / {
        proxy_pass http://silex:6805;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
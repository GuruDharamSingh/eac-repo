<!--
  EAC Glowing CTA Section — HTML Template
  =========================================
  Dark full-width section with radial ambient glow, headline,
  subhead, and dual-button row (primary solid + ghost).
-->
<section class="eac-cta-glow" data-gjs-type="eac-cta-glow">

  <div class="eac-cta-glow__bg" aria-hidden="true">
    <div class="eac-cta-glow__glow"></div>
  </div>

  <div class="eac-cta-glow__inner">

    <h2 class="eac-cta-glow__heading"
        data-gjs-editable="true" data-trait="headingText">
      Ready to create something together?
    </h2>

    <p class="eac-cta-glow__sub"
       data-gjs-editable="true" data-trait="subText">
      Join the collective. Your first workshop is free.
    </p>

    <div class="eac-cta-glow__btn-row">
      <a href="/join"
         class="eac-cta-glow__btn eac-cta-glow__btn--primary"
         data-trait="primaryLabel" data-href-trait="primaryHref">
        Join the collective
      </a>
      <a href="/workshops"
         class="eac-cta-glow__btn eac-cta-glow__btn--ghost"
         data-trait="ghostLabel" data-href-trait="ghostHref">
        Browse workshops
      </a>
    </div>

  </div>

</section>

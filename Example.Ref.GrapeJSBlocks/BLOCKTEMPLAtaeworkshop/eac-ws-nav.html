  =================

  Minimal platform nav: EAC mark + contact CTA.
-->
<nav class="eac-ws-nav" data-gjs-type="eac-ws-nav" aria-label="Workshop page navigation">

  <div class="eac-ws-nav__inner">

    <!-- Platform monogram -->
    <a class="eac-ws-nav__brand" href="/">
      <span class="eac-ws-nav__wordmark">EAC</span>
    </a>

    <!-- Right: CTA -->
    <div class="eac-ws-nav__actions">
      <a class="eac-ws-nav__cta"
         href="#register"
         data-trait="ctaLabel"
         data-href-trait="ctaHref">
        Stay in touch
      </a>
    </div>

  </div>

</nav>
